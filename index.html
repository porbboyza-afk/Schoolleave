<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการลา - โรงเรียนหนองใสพรเจริญวิทยา</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #cbd5e1; /* Slate 300 - พื้นหลังเข้มขึ้นเพื่อความชัดเจน */
        }
        .teacher-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 2px;
        }
        .teacher-card:hover {
            transform: translateY(-5px);
            border-color: #1d4ed8; 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.15);
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, deleteDoc, addDoc };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- Safe Icon Component for CDN Environment ---
        const IconComp = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name] && iconRef.current) {
                    const svg = window.lucide.icons[name].toSvg({
                        width: size,
                        height: size,
                        class: className
                    });
                    iconRef.current.innerHTML = svg;
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            // --- Configuration & Initialization ---
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'nongsai-leave-online';
            
            // --- Firebase States ---
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [isOnline, setIsOnline] = useState(false);

            // --- App States ---
            const [currentPage, setCurrentPage] = useState('selection'); 
            const [selectedTeacher, setSelectedTeacher] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notifications, setNotifications] = useState([]);
            const [editingRequest, setEditingRequest] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [requestToDelete, setRequestToDelete] = useState(null);
            const [isAuthorizedMaster, setIsAuthorizedMaster] = useState(false);

            const [requests, setRequests] = useState([]);
            const [cloudPasswords, setCloudPasswords] = useState({});

            const baseTeachers = [
                { id: 1, name: 'นายชุมพร กรุณานำ', pos: 'ผอ.รร', role: 'admin' },
                { id: 2, name: 'นางสาวสราลักษณ์ แก้วโสภา', pos: 'ครู คศ.3', role: 'user' },
                { id: 3, name: 'นางจิราพร ไชยมาศ', pos: 'ครู คศ.3', role: 'user' },
                { id: 4, name: 'นางสาวธีมาพร นามบุรี', pos: 'ครู คศ.1', role: 'user' },
                { id: 5, name: 'นางวาสนา สุขขิน', pos: 'ครู คศ.2', role: 'user' },
                { id: 6, name: 'นางสาวยุวดี จิตรปรีดา', pos: 'ครู คศ.3', role: 'user' },
                { id: 7, name: 'นายครองศักดิ์ ขาวขันธ์', pos: 'ครู คศ.3', role: 'user' },
                { id: 8, name: 'นายวิทธวัช ตาลมงคล', pos: 'ครู คศ.1', role: 'user' },
                { id: 9, name: 'นายเอกวิทย์ ฝุ่นเงิน', pos: 'ครู คศ.2', role: 'user' },
                { id: 10, name: 'นายราชาชัย รุ่งโรจน์', pos: 'ครู คศ.2', role: 'user' },
                { id: 11, name: 'นางสาวนิราณี รักษาวงศ์', pos: 'ครูผู้ช่วย', role: 'user' },
                { id: 12, name: 'นางนวลมณี สมประสงค์', pos: 'ครู คศ.3', role: 'user' },
                { id: 13, name: 'นางสาวศิริลักษณ์ อัคนิจ', pos: 'ครู คศ.1', role: 'user' },
                { id: 14, name: 'นายสุรศักดิ์ อุ่นแก้ว', pos: 'ครู คศ.1', role: 'user' },
                { id: 15, name: 'นายเกรียงศักดิ์ สร้อยกลางเมือง', pos: 'ครู คศ.1', role: 'user' },
                { id: 16, name: 'นางสาวนัฐธิยา จันทร์ศรีโคตร', pos: 'ครูอัตราจ้าง', role: 'user' },
                { id: 17, name: 'นายปรัชญา ศรีจันทร์', pos: 'จนท.ธุรการ', role: 'user', isSecretary: true },
            ];

            const [formData, setFormData] = useState({ type: 'ลากิจ', startDate: '', endDate: '', reason: '', substitute: '' });
            const [newPasswordData, setNewPasswordData] = useState({ old: '', new: '', confirm: '' });

            // --- Authentication & Setup ---
            useEffect(() => {
                const init = async () => {
                    if (!window.FirebaseSDK) return;
                    const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                    
                    let config = null;
                    try {
                        if (typeof __firebase_config !== 'undefined') {
                            config = JSON.parse(__firebase_config);
                        }
                    } catch (e) { config = null; }

                    if (config) {
                        const fbApp = initializeApp(config);
                        const fbAuth = getAuth(fbApp);
                        const fbDb = getFirestore(fbApp);
                        setAuth(fbAuth);
                        setDb(fbDb);

                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(fbAuth, __initial_auth_token);
                            } else {
                                await signInAnonymously(fbAuth);
                            }
                        } catch (e) { console.error("Auth Failed:", e); }
                        
                        onAuthStateChanged(fbAuth, setUser);
                        setIsOnline(true);
                    }
                };
                init();
            }, []);

            // --- Firestore Listeners ---
            useEffect(() => {
                if (!db || !user) return;
                const { collection, onSnapshot } = window.FirebaseSDK;

                const unsubReq = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'requests'), 
                    (snaps) => {
                        setRequests(snaps.docs.map(d => ({ id: d.id, ...d.data() })));
                    },
                    (err) => console.error("Firestore Permission Error:", err)
                );

                const unsubPass = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'passwords'), 
                    (snaps) => {
                        const dict = {};
                        snaps.docs.forEach(d => { dict[d.id] = d.data().password; });
                        setCloudPasswords(dict);
                    },
                    (err) => console.error("Firestore Password Error:", err)
                );

                return () => { unsubReq(); unsubPass(); };
            }, [db, user, appId]);

            // --- Helpers ---
            const formatDateBE = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('-');
                if (parts.length !== 3) return dateStr;
                const year = parseInt(parts[0]);
                const yearBE = year < 2400 ? year + 543 : year;
                return `${parts[2]}/${parts[1]}/${yearBE}`;
            };
            const getCurrentYearBE = () => new Date().getFullYear() + 543;
            const getCurrentDateBE = () => {
                const now = new Date();
                const yearBE = now.getFullYear() + 543;
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                return `${yearBE}-${month}-${day}`;
            };

            // --- Logic Hooks (Defined Early to prevent ReferenceErrors) ---
            const isAdmin = selectedTeacher?.role === 'admin';
            const isMaster = isAuthorizedMaster;
            const currentPassword = cloudPasswords[selectedTeacher?.id] || '1234';
            const userRequests = useMemo(() => selectedTeacher ? requests.filter(r => r.userId === selectedTeacher.id) : [], [requests, selectedTeacher]);
            const stats = useMemo(() => {
                const calc = (type) => ({ 
                    used: userRequests.filter(r => r.type === type && r.status === 'approved').length, 
                    pending: userRequests.filter(r => r.type === type && r.status === 'pending').length 
                });
                return { personal: calc('ลากิจ'), sick: calc('ลาป่วย'), maternity: calc('ลาคลอดบุตร'), paternity: calc('ลาช่วยภรรยา'), ordination: calc('ลาอุปสมบท') };
            }, [userRequests]);

            // --- Action Handlers ---
            const handleLoginSubmit = (e) => {
                e.preventDefault();
                if (!selectedTeacher) return;
                const isMasterLogin = passwordInput === '0814' && selectedTeacher.isSecretary;
                if (isMasterLogin || passwordInput === currentPassword) {
                    setIsAuthorizedMaster(isMasterLogin);
                    setCurrentPage('app');
                    setShowLoginModal(false);
                    setActiveTab(isMasterLogin ? 'manage_all' : (selectedTeacher.role === 'admin' ? 'admin' : 'dashboard'));
                    setPasswordInput('');
                } else { alert("รหัสผ่านไม่ถูกต้อง"); }
            };

            const handleLogout = () => {
                setSelectedTeacher(null);
                setCurrentPage('selection');
                setShowLoginModal(false);
                setIsAuthorizedMaster(false);
                setIsMobileMenuOpen(false);
                setPasswordInput('');
                setActiveTab('dashboard');
            };

            const handleSubmitRequest = async (e) => {
                e.preventDefault();
                if (!isOnline) { alert("ระบบกำลังทำงาน Offline ข้อมูลจะไม่ส่งถึง ผอ. เครื่องอื่น"); return; }
                const { addDoc, collection } = window.FirebaseSDK;
                const cv = (val) => {
                    const p = val.split('-');
                    const y = parseInt(p[0]);
                    return `${y < 2400 ? y + 543 : y}-${p[1]}-${p[2]}`;
                };
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'requests'), {
                        userId: selectedTeacher.id,
                        ...formData,
                        startDate: cv(formData.startDate),
                        endDate: cv(formData.endDate),
                        status: 'pending',
                        submittedAt: getCurrentDateBE(),
                        timestamp: Date.now()
                    });
                    setNotifications([{ id: Date.now(), msg: "ส่งใบลาสำเร็จ ข้อมูลจะปรากฏที่เครื่อง ผอ. ทันที" }]);
                    setTimeout(() => setNotifications([]), 4000);
                    setActiveTab('history');
                    setFormData({ type: 'ลากิจ', startDate: '', endDate: '', reason: '', substitute: '' });
                } catch (err) { alert("เกิดข้อผิดพลาดในการส่งข้อมูล: " + err.message); }
            };

            const updateStatus = async (id, newStatus) => {
                if (!isOnline) return;
                const { updateDoc, doc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'requests', id), { status: newStatus });
                setNotifications([{ id: Date.now(), msg: "อัปเดตสถานะสำเร็จ" }]);
                setTimeout(() => setNotifications([]), 3000);
            };

            const exportToExcel = () => {
                const headers = ['ลำดับ', 'ชื่อ-นามสกุล', 'ประเภท', 'เริ่ม', 'ถึง', 'เหตุผล', 'ผู้ปฏิบัติแทน', 'สถานะ'];
                const sorted = [...requests].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                const rows = sorted.map((req, idx) => {
                    const t = baseTeachers.find(x => x.id === req.userId);
                    return [idx + 1, t?.name, req.type, formatDateBE(req.startDate), formatDateBE(req.endDate), (req.reason || '').replace(/,/g, ' '), req.substitute, req.status];
                });
                const csv = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                link.download = `รายงานการลา_รร_หนองใส_${getCurrentDateBE()}.csv`;
                link.click();
            };

            // --- Rendering ---
            if (currentPage === 'selection') {
                return (
                    <div className="min-h-screen p-4 md:p-12 flex flex-col items-center">
                        {showLoginModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-10 animate-fade-in border-4 border-white text-center">
                                    <div className="w-20 h-20 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-blue-200"><IconComp name="key-round" size={36} /></div>
                                    <h3 className="text-2xl font-extrabold text-slate-800 tracking-tight">ยืนยันรหัสผ่าน</h3>
                                    <p className="text-blue-600 font-bold mb-8">{selectedTeacher?.name}</p>
                                    <form onSubmit={handleLoginSubmit} className="space-y-6">
                                        <input autoFocus type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="รหัสผ่าน" className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl text-center text-3xl font-black tracking-widest outline-none focus:ring-4 focus:ring-blue-100" />
                                        <div className="flex gap-4">
                                            <button type="button" onClick={() => setShowLoginModal(false)} className="flex-1 py-4 text-slate-500 font-bold">ยกเลิก</button>
                                            <button type="submit" className="flex-1 bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg">ตกลง</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                        <div className="max-w-7xl w-full text-center">
                            <div className="mb-12 inline-block px-10 py-5 bg-white/80 rounded-[2rem] border-2 border-slate-300 shadow-xl backdrop-blur-sm">
                                <h1 className="text-4xl font-black text-blue-950 uppercase tracking-tighter">ระบบจัดการการลา ออนไลน์</h1>
                                <p className="text-slate-600 font-bold uppercase tracking-widest text-xs mt-1">โรงเรียนหนองใสพรเจริญวิทยา (พ.ศ. {getCurrentYearBE()})</p>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                {baseTeachers.map(t => (
                                    <button key={t.id} onClick={() => { setSelectedTeacher(t); setShowLoginModal(true); }} className={`teacher-card bg-white p-6 rounded-[1.5rem] border-2 shadow-lg text-left flex flex-col justify-between h-44 ${t.role === 'admin' ? 'border-blue-400 bg-blue-50/50' : 'border-slate-300'}`}>
                                        <div>
                                            <h3 className="font-extrabold text-slate-900 text-xl leading-tight mb-2 break-words">{t.name} {t.role === 'admin' && <IconComp name="shield-check" size={18} className="text-blue-600 inline ml-1" />}</h3>
                                            <span className={`inline-block px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${t.role === 'admin' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>{t.pos}</span>
                                        </div>
                                        <div className="flex justify-end items-center mt-4">
                                            <div className="p-2 bg-slate-50 border border-slate-200 rounded-full group-hover:bg-blue-600 group-hover:text-white transition-colors"><IconComp name="chevron-right" size={16} /></div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row antialiased">
                    {requestToDelete && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4 text-center">
                            <div className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full animate-fade-in border-2 border-red-50">
                                <IconComp name="alert-triangle" size={48} className="text-red-500 mb-4" />
                                <h3 className="text-2xl font-black mb-2 text-slate-800 uppercase">ลบข้อมูลคลาวด์?</h3>
                                <p className="text-slate-500 text-sm mb-8 font-bold leading-relaxed px-4">ต้องการลบรายการลานี้ออกจากระบบออนไลน์อย่างถาวรหรือไม่?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setRequestToDelete(null)} className="flex-1 py-3 font-bold bg-slate-100 rounded-2xl transition-all">ยกเลิก</button>
                                    <button onClick={async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'requests', requestToDelete)); setRequestToDelete(null); }} className="flex-1 py-3 bg-red-600 text-white font-black rounded-2xl hover:bg-red-700 shadow-lg transition-all">ยืนยันลบ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className={`fixed md:sticky top-0 h-screen w-72 bg-white border-r-2 border-slate-200 z-40 transform transition-transform duration-300 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-8 font-black text-blue-700 italic text-2xl tracking-tighter border-b-2 border-slate-50 mb-4 uppercase">SYSTEM ADMIN</div>
                        <nav className="px-4 space-y-1 flex-1 overflow-y-auto">
                            <button onClick={() => {setActiveTab('dashboard'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-700 text-white shadow-lg shadow-blue-100' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="layout-dashboard" size={20} /> แผงควบคุม</button>
                            {!isAdmin && <button onClick={() => {setActiveTab('request'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'request' ? 'bg-blue-700 text-white shadow-lg shadow-blue-100' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="file-text" size={20} /> เขียนใบลา</button>}
                            <button onClick={() => {setActiveTab('history'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'history' ? 'bg-blue-700 text-white shadow-lg shadow-blue-100' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="history" size={20} /> ประวัติการลา</button>
                            {isAdmin && <button onClick={() => {setActiveTab('admin'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'admin' ? 'bg-blue-700 text-white shadow-lg shadow-blue-100' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="user-check" size={20} /> พิจารณาอนุมัติ</button>}
                            {isMaster && <button onClick={() => {setActiveTab('manage_all'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'manage_all' ? 'bg-amber-600 text-white shadow-lg shadow-amber-100' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="edit-3" size={20} /> จัดการข้อมูลครู</button>}
                            <div className="pt-4 border-t-2 border-slate-50 mt-4">
                                <button onClick={() => {setActiveTab('settings'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'settings' ? 'bg-slate-800 text-white shadow-lg shadow-slate-100' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="settings" size={20} /> ตั้งค่ารหัสผ่าน</button>
                            </div>
                        </nav>
                        <div className="p-6 border-t-2 bg-slate-50/50">
                            <p className="text-sm font-black text-slate-900 leading-tight truncate">{selectedTeacher?.name}</p>
                            <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">{selectedTeacher?.pos} {isMaster && '(MASTER)'}</p>
                            <button onClick={handleLogout} className="w-full mt-4 flex items-center justify-center gap-3 py-3 bg-red-50 text-red-600 rounded-2xl font-black text-xs uppercase shadow-sm border border-red-100 hover:bg-red-100 transition-all"><IconComp name="log-out" size={18} /> Logout</button>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-10 overflow-y-auto">
                        {notifications.map(n => <div key={n.id} className="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-3xl shadow-2xl z-[100] font-black text-sm animate-fade-in">{n.msg}</div>)}
                        
                        <div className="mb-10 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                            <div>
                                <h2 className="text-4xl font-black uppercase tracking-tighter text-slate-900 italic leading-none">{activeTab.replace('_', ' ')}</h2>
                                <p className={`text-[10px] font-bold mt-2 uppercase px-3 py-1 rounded-full inline-block tracking-widest ${isOnline ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                                    {isOnline ? '● Sync Enabled' : '● Offline Mode'}
                                </p>
                            </div>
                            {(isAdmin || isMaster) && <button onClick={exportToExcel} className="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black text-xs flex gap-3 items-center uppercase tracking-widest shadow-xl hover:bg-emerald-700 active:scale-95 transition-all"><IconComp name="download" size={18} /> Export Excel</button>}
                        </div>

                        {activeTab === 'dashboard' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl border-2 border-slate-100 overflow-hidden animate-fade-in">
                                <div className="p-10 border-b-2 font-black text-2xl uppercase text-slate-800 flex items-center gap-3 italic"><IconComp name="clipboard-list" className="text-blue-600" /> สรุปยอดวันลาสะสม พ.ศ. {getCurrentYearBE()}</div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase tracking-[0.2em] text-slate-400"><tr><th className="px-10 py-6">ประเภทการลา</th><th className="px-10 py-6 text-center">อนุมัติแล้ว</th><th className="px-10 py-6 text-center">รอดำเนินการ</th><th className="px-10 py-6 text-right">สถานะ</th></tr></thead>
                                        <tbody className="divide-y-2 divide-slate-50 font-bold">
                                            {[{t:'ลากิจ', s:stats.personal}, {t:'ลาป่วย', s:stats.sick}, {t:'ลาคลอดบุตร', s:stats.maternity}, {t:'ลาช่วยภรรยา', s:stats.paternity}, {t:'ลาอุปสมบท', s:stats.ordination}].map((r, i) => (
                                                <tr key={i} className="hover:bg-slate-50/50 transition-colors font-bold"><td className="px-10 py-8 text-lg text-slate-700 uppercase">{r.t}</td><td className="px-10 py-8 text-center text-emerald-600 text-4xl font-black">{r.s.used}</td><td className="px-10 py-8 text-center text-amber-500 text-4xl font-black">{r.s.pending}</td><td className="px-10 py-8 text-right font-black uppercase text-[10px] text-slate-400 italic">Syncing</td></tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeTab === 'request' && (
                            <div className="max-w-3xl bg-white rounded-[2.5rem] p-10 md:p-12 shadow-xl border-2 border-slate-100 animate-fade-in">
                                <h3 className="text-3xl font-black mb-10 tracking-tight italic uppercase text-slate-900 border-b-4 border-blue-100 pb-4 inline-block">เขียนใบลาออนไลน์</h3>
                                <form onSubmit={handleSubmitRequest} className="space-y-8 font-bold text-slate-700">
                                    <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest italic ml-1">ประเภท</label><select name="type" value={formData.type} onChange={(e) => setFormData({...formData, type: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-100 text-lg"><option>ลากิจ</option><option>ลาป่วย</option><option>ลาคลอดบุตร</option><option>ลาช่วยภรรยาคลอดบุตร</option><option>ลาอุปสมบท</option></select></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest italic ml-1">เริ่ม</label><input type="date" value={formData.startDate} required className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl font-bold" onChange={(e) => setFormData({...formData, startDate: e.target.value})} /></div>
                                        <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest italic ml-1">ถึง</label><input type="date" value={formData.endDate} required className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl font-bold" onChange={(e) => setFormData({...formData, endDate: e.target.value})} /></div>
                                    </div>
                                    <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest italic ml-1">สอนแทนโดย</label><input type="text" value={formData.substitute} required placeholder="ระบุชื่อผู้ปฏิบัติหน้าที่แทน" className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl font-bold" onChange={(e) => setFormData({...formData, substitute: e.target.value})} /></div>
                                    <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest italic ml-1">รายละเอียดเหตุผล</label><textarea value={formData.reason} rows="4" required placeholder="ระบุเหตุผลความจำเป็นในการขอลา..." className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl font-bold outline-none" onChange={(e) => setFormData({...formData, reason: e.target.value})}></textarea></div>
                                    <button type="submit" className="w-full bg-blue-700 text-white p-6 rounded-[2rem] font-black text-xl hover:bg-blue-800 transition-all shadow-2xl active:scale-95 flex items-center justify-center gap-4 uppercase tracking-widest"><IconComp name="send" size={24} /> ยืนยันส่งใบลา</button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="bg-white rounded-[2.5rem] border-2 border-slate-100 overflow-hidden shadow-xl animate-fade-in">
                                <table className="w-full text-left min-w-[600px]"><thead className="bg-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400"><tr><th className="px-10 py-6">ประเภทการลา</th><th className="px-10 py-6 text-center">ระยะเวลา (พ.ศ.)</th><th className="px-10 py-6 text-right">สถานะปัจจุบัน</th></tr></thead><tbody className="divide-y-2 divide-slate-50 font-bold text-slate-700">
                                    {userRequests.map(req => (
                                        <tr key={req.id} className="hover:bg-slate-50/50 transition-colors"><td className="px-10 py-8 text-lg">{req.type}</td><td className="px-10 py-8 text-center text-slate-500 italic text-sm">{formatDateBE(req.startDate)} — {formatDateBE(req.endDate)}</td><td className="px-10 py-8 text-right"><span className={`px-5 py-2 rounded-2xl text-xs font-black uppercase tracking-widest ${req.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : req.status === 'pending' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>{req.status === 'approved' ? 'อนุมัติแล้ว' : 'รอดำเนินการ'}</span></td></tr>
                                    ))}
                                    {userRequests.length === 0 && <tr><td colSpan="3" className="px-10 py-20 text-center text-slate-300 font-black uppercase italic tracking-widest">No History Found</td></tr>}
                                </tbody></table>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-blue-900 rounded-[3.5rem] p-12 text-white shadow-2xl flex justify-between items-center relative overflow-hidden">
                                    <div className="relative z-10 font-black"><h3 className="text-4xl italic uppercase tracking-tighter">PENDING APPROVALS</h3><p className="font-bold opacity-80 mt-1">รายการรอดำเนินการ (ออนไลน์)</p></div>
                                    <div className="text-right z-10 font-black"><span className="text-8xl text-yellow-400 leading-none">{requests.filter(r => r.status === 'pending').length}</span></div>
                                </div>
                                <div className="space-y-4">
                                    {requests.filter(r => r.status === 'pending').map(req => {
                                        const t = baseTeachers.find(x => x.id === req.userId);
                                        return (
                                            <div key={req.id} className="bg-white p-10 rounded-[2.5rem] border-2 border-slate-100 shadow-xl flex flex-col lg:flex-row lg:items-center justify-between gap-8 hover:border-blue-400 transition-all">
                                                <div className="flex-1">
                                                    <h4 className="font-black text-2xl text-slate-900 flex items-center gap-2">{t?.name} <span className="text-xs bg-blue-50 text-blue-600 px-3 py-1 rounded-full uppercase">{t?.pos}</span></h4>
                                                    <div className="mt-2 text-blue-600 font-black text-sm uppercase tracking-widest flex gap-4 italic"><span>{req.type}</span><span className="text-slate-400">{formatDateBE(req.startDate)} - {formatDateBE(req.endDate)}</span></div>
                                                    <div className="bg-slate-50 p-8 rounded-[2rem] border-l-[12px] border-blue-600 mt-6 italic font-bold text-slate-600 text-xl leading-relaxed shadow-inner">"{req.reason}"</div>
                                                    <p className="mt-4 text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] italic flex items-center gap-2 underline decoration-blue-100 decoration-4 underline-offset-4">ผู้ปฏิบัติแทน: {req.substitute || '-'}</p>
                                                </div>
                                                <div className="flex gap-4">
                                                    <button onClick={() => updateStatus(req.id, 'rejected')} className="px-8 py-5 border-2 border-red-100 text-red-600 font-black rounded-2xl text-xs uppercase tracking-widest hover:bg-red-50 transition-all">Reject</button>
                                                    <button onClick={() => updateStatus(req.id, 'approved')} className="px-14 py-5 bg-emerald-600 text-white font-black rounded-2xl text-xs uppercase tracking-widest shadow-xl shadow-emerald-100 hover:bg-emerald-700 active:scale-95 transition-all">Approve</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {requests.filter(r => r.status === 'pending').length === 0 && <div className="bg-white py-32 text-center rounded-[3rem] border-4 border-dashed border-slate-200 text-slate-300 font-black text-2xl uppercase italic tracking-widest">No Requests</div>}
                                </div>
                            </div>
                        )}

                        {activeTab === 'manage_all' && (
                            <div className="space-y-6 animate-fade-in">
                                <div className="bg-gradient-to-r from-amber-600 to-amber-500 rounded-[3rem] p-10 text-white shadow-2xl flex justify-between items-center relative overflow-hidden">
                                    <div className="relative z-10 font-black"><h3 className="text-3xl italic uppercase tracking-tighter italic leading-none">DATA MANAGER</h3><p className="font-bold opacity-90 mt-1 uppercase text-xs tracking-widest">Master Control: จัดการข้อมูลบุคลากรทั้งหมด</p></div>
                                    <IconComp name="shield-alert" size={120} className="absolute right-10 opacity-10" />
                                </div>
                                <div className="bg-white rounded-[2.5rem] border-2 border-slate-100 overflow-hidden shadow-xl overflow-x-auto">
                                    <table className="w-full text-left min-w-[900px]"><thead className="bg-slate-50 text-[10px] font-black uppercase tracking-widest text-slate-400"><tr><th className="px-8 py-5">ชื่อครู</th><th className="px-8 py-5">ประเภท</th><th className="px-8 py-5 text-center">วันที่ (พ.ศ.)</th><th className="px-8 py-5 text-center">สถานะ</th><th className="px-8 py-5 text-right">ดำเนินการ</th></tr></thead><tbody className="divide-y-2 divide-slate-100 font-bold text-slate-700 text-base">
                                        {requests.map(req => {
                                            const t = baseTeachers.find(x => x.id === req.userId);
                                            const isEditing = editingRequest?.id === req.id;
                                            return (
                                                <tr key={req.id} className="hover:bg-slate-50/50 transition-colors">
                                                    <td className="px-8 py-6 font-extrabold">{t?.name || 'Unknown'}</td>
                                                    <td className="px-8 py-6">{isEditing ? <select value={editingRequest.type} onChange={(e) => setEditingRequest({...editingRequest, type: e.target.value})} className="bg-slate-100 p-2 rounded-xl font-bold"><option>ลากิจ</option><option>ลาป่วย</option><option>ลาคลอดบุตร</option><option>ลาช่วยภรรยาคลอดบุตร</option><option>ลาอุปสมบท</option></select> : req.type}</td>
                                                    <td className="px-8 py-6 text-center text-sm font-medium">{isEditing ? <div className="flex gap-2 justify-center"><input type="text" value={editingRequest.startDate} onChange={(e) => setEditingRequest({...editingRequest, startDate: e.target.value})} className="w-28 bg-slate-100 px-2 py-1 rounded" /><input type="text" value={editingRequest.endDate} onChange={(e) => setEditingRequest({...editingRequest, endDate: e.target.value})} className="w-28 bg-slate-100 px-2 py-1 rounded" /></div> : `${formatDateBE(req.startDate)} - ${formatDateBE(req.endDate)}`}</td>
                                                    <td className="px-8 py-6 text-center uppercase text-[10px]">{isEditing ? <select value={editingRequest.status} onChange={(e) => setEditingRequest({...editingRequest, status: e.target.value})} className="bg-slate-100 p-2 rounded-xl font-black"><option value="pending">PENDING</option><option value="approved">APPROVED</option><option value="rejected">REJECTED</option></select> : <span className={`px-3 py-1 rounded-lg tracking-widest ${req.status === 'approved' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}`}>{req.status}</span>}</td>
                                                    <td className="px-8 py-6 text-right">
                                                        {isEditing ? (
                                                            <div className="flex gap-2 justify-end"><button onClick={async () => { const { updateDoc, doc } = window.FirebaseSDK; await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'requests', editingRequest.id), { ...editingRequest }); setEditingRequest(null); }} className="p-3 bg-emerald-600 text-white rounded-xl shadow-lg"><IconComp name="save" size={18} /></button><button onClick={() => setEditingRequest(null)} className="p-3 bg-slate-200 text-slate-600 rounded-xl"><IconComp name="x-circle" size={18} /></button></div>
                                                        ) : (
                                                            <div className="flex gap-2 justify-end"><button onClick={() => setEditingRequest({...req})} className="p-3 bg-blue-50 text-blue-600 rounded-xl transition-all"><IconComp name="edit-3" size={18} /></button><button onClick={() => setRequestToDelete(req.id)} className="p-3 bg-red-50 text-red-500 rounded-xl transition-all"><IconComp name="trash-2" size={18} /></button></div>
                                                        )}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody></table>
                                </div>
                            </div>
                        )}
                        
                        {activeTab === 'settings' && (
                            <div className="max-w-2xl bg-white rounded-[2.5rem] shadow-xl border-2 border-slate-100 p-12 animate-fade-in">
                                <h3 className="text-3xl font-black text-slate-900 mb-8 uppercase tracking-tight italic flex items-center gap-3"><IconComp name="key" className="text-blue-600" /> CHANGE PASSWORD</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    if (!isOnline) { alert("ขณะนี้ระบบทำงาน Offline ไม่สามารถเปลี่ยนรหัสผ่านบนคลาวด์ได้"); return; }
                                    if (newPasswordData.old !== currentPassword) { alert("รหัสผ่านปัจจุบันไม่ถูกต้อง"); return; }
                                    if (newPasswordData.new !== newPasswordData.confirm) { alert("รหัสผ่านใหม่ไม่ตรงกัน"); return; }
                                    const { setDoc, doc } = window.FirebaseSDK;
                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'passwords', String(selectedTeacher.id)), { password: newPasswordData.new });
                                    setNotifications([{ id: Date.now(), msg: "เปลี่ยนรหัสผ่านบนระบบออนไลน์สำเร็จแล้ว" }]);
                                    setTimeout(() => setNotifications([]), 3000);
                                    setActiveTab('dashboard');
                                    setNewPasswordData({ old: '', new: '', confirm: '' });
                                }} className="space-y-6 font-bold text-slate-700">
                                    <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 italic">Current Password</label><input type="password" value={newPasswordData.old} required className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-blue-500" onChange={(e) => setNewPasswordData({...newPasswordData, old: e.target.value})} /></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 italic">New Password</label><input type="password" value={newPasswordData.new} required className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-blue-500" onChange={(e) => setNewPasswordData({...newPasswordData, new: e.target.value})} /></div>
                                        <div className="space-y-2"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1 italic">Confirm New</label><input type="password" value={newPasswordData.confirm} required className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl outline-none focus:border-blue-500" onChange={(e) => setNewPasswordData({...newPasswordData, confirm: e.target.value})} /></div>
                                    </div>
                                    <button type="submit" className="w-full bg-slate-900 text-white p-6 rounded-[2rem] font-black text-lg uppercase shadow-xl transition-all hover:bg-black active:scale-95">Update Cloud Password</button>
                                </form>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
