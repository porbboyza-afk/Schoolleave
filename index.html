<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการลา - โรงเรียนหนองใสพรเจริญวิทยา</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #cbd5e1; /* Slate 300 เข้มขึ้นเพื่อให้การ์ดขาวเด่น */
        }
        .teacher-card {
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            border-width: 2px;
            border-color: #94a3b8; /* Slate 400 */
        }
        .teacher-card:hover {
            transform: translateY(-5px);
            border-color: #2563eb; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        // Firebase SDK Import via CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, onSnapshot, updateDoc, deleteDoc, addDoc };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- Firebase Configuration (Your Keys Integrated) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAUryuhFy1uunyyRXmFJsRARkUSbTT68FA",
            authDomain: "schoolleave-669a7.firebaseapp.com",
            projectId: "schoolleave-669a7",
            storageBucket: "schoolleave-669a7.firebasestorage.app",
            messagingSenderId: "850104833391",
            appId: "1:850104833391:web:b9bb828d6625778691c49a",
            measurementId: "G-3YMMBD7P6P"
        };

        // --- Safe Icon Component ---
        const IconComp = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons[name] && iconRef.current) {
                    iconRef.current.innerHTML = window.lucide.icons[name].toSvg({
                        width: size, height: size, class: className
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            // --- Firebase Instance ---
            const [db, setDb] = useState(null);
            const [user, setUser] = useState(null);
            const [isOnline, setIsOnline] = useState(false);
            const appId = 'nongsai-leave-v26';

            // --- UI States ---
            const [currentPage, setCurrentPage] = useState('selection'); 
            const [selectedTeacher, setSelectedTeacher] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notifications, setNotifications] = useState([]);
            const [editingRequest, setEditingRequest] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [requestToDelete, setRequestToDelete] = useState(null);
            const [isAuthorizedMaster, setIsAuthorizedMaster] = useState(false);

            // Cloud Data
            const [requests, setRequests] = useState([]);
            const [cloudPasswords, setCloudPasswords] = useState({});

            // Teacher List (image_c93da2.png)
            const teachersList = [
                { id: 1, name: 'นายชุมพร กรุณานำ', pos: 'ผอ.รร', role: 'admin' },
                { id: 2, name: 'นางสาวสราลักษณ์ แก้วโสภา', pos: 'ครู คศ.3', role: 'user' },
                { id: 3, name: 'นางจิราพร ไชยมาศ', pos: 'ครู คศ.3', role: 'user' },
                { id: 4, name: 'นางสาวธีมาพร นามบุรี', pos: 'ครู คศ.1', role: 'user' },
                { id: 5, name: 'นางวาสนา สุขขิน', pos: 'ครู คศ.2', role: 'user' },
                { id: 6, name: 'นางสาวยุวดี จิตรปรีดา', pos: 'ครู คศ.3', role: 'user' },
                { id: 7, name: 'นายครองศักดิ์ ขาวขันธ์', pos: 'ครู คศ.3', role: 'user' },
                { id: 8, name: 'นายวิทธวัช ตาลมงคล', pos: 'ครู คศ.1', role: 'user' },
                { id: 9, name: 'นายเอกวิทย์ ฝุ่นเงิน', pos: 'ครู คศ.2', role: 'user' },
                { id: 10, name: 'นายราชาชัย รุ่งโรจน์', pos: 'ครู คศ.2', role: 'user' },
                { id: 11, name: 'นางสาวนิราณี รักษาวงศ์', pos: 'ครูผู้ช่วย', role: 'user' },
                { id: 12, name: 'นางนวลมณี สมประสงค์', pos: 'ครู คศ.3', role: 'user' },
                { id: 13, name: 'นางสาวศิริลักษณ์ อัคนิจ', pos: 'ครู คศ.1', role: 'user' },
                { id: 14, name: 'นายสุรศักดิ์ อุ่นแก้ว', pos: 'ครู คศ.1', role: 'user' },
                { id: 15, name: 'นายเกรียงศักดิ์ สร้อยกลางเมือง', pos: 'ครู คศ.1', role: 'user' },
                { id: 16, name: 'นางสาวนัฐธิยา จันทร์ศรีโคตร', pos: 'ครูอัตราจ้าง', role: 'user' },
                { id: 17, name: 'นายปรัชญา ศรีจันทร์', pos: 'จนท.ธุรการ', role: 'user', isSecretary: true },
            ];

            const [formData, setFormData] = useState({ type: 'ลากิจ', startDate: '', endDate: '', reason: '', substitute: '' });

            // --- Setup Firebase ---
            useEffect(() => {
                const init = async () => {
                    const sdk = window.FirebaseSDK;
                    if (!sdk) return;
                    const app = sdk.initializeApp(firebaseConfig);
                    const auth = sdk.getAuth(app);
                    const db = sdk.getFirestore(app);
                    setDb(db);
                    
                    try {
                        await sdk.signInAnonymously(auth);
                        sdk.onAuthStateChanged(auth, setUser);
                        setIsOnline(true);
                    } catch (e) { console.error("Firebase Login Failed", e); }
                };
                init();
            }, []);

            // --- Sync Data ---
            useEffect(() => {
                if (!db || !user) return;
                const sdk = window.FirebaseSDK;
                const unsubReq = sdk.onSnapshot(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'requests'), (snaps) => {
                    setRequests(snaps.docs.map(d => ({ id: d.id, ...d.data() })));
                }, (err) => console.log("Waiting for rules..."));

                const unsubPass = sdk.onSnapshot(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'passwords'), (snaps) => {
                    const dict = {};
                    snaps.docs.forEach(d => { dict[d.id] = d.data().password; });
                    setCloudPasswords(dict);
                });
                return () => { unsubReq(); unsubPass(); };
            }, [db, user]);

            // --- Helpers ---
            const currentYearBE = new Date().getFullYear() + 543;
            const formatDateBE = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('-');
                if (parts.length !== 3) return dateStr;
                const year = parseInt(parts[0]);
                const yearBE = year < 2400 ? year + 543 : year;
                return `${parts[2]}/${parts[1]}/${yearBE}`;
            };

            // --- Computed Values (Always Top Level) ---
            const isAdmin = selectedTeacher?.role === 'admin';
            const isMaster = isAuthorizedMaster;
            const currentPassword = cloudPasswords[selectedTeacher?.id] || '1234';
            const userRequests = useMemo(() => selectedTeacher ? requests.filter(r => r.userId === selectedTeacher.id) : [], [requests, selectedTeacher]);
            const stats = useMemo(() => {
                const calc = (type) => ({ 
                    used: userRequests.filter(r => r.type === type && r.status === 'approved').length, 
                    pending: userRequests.filter(r => r.type === type && r.status === 'pending').length 
                });
                return { personal: calc('ลากิจ'), sick: calc('ลาป่วย'), maternity: calc('ลาคลอดบุตร'), paternity: calc('ลาช่วยภรรยา'), ordination: calc('ลาอุปสมบท') };
            }, [userRequests]);

            // --- Handlers ---
            const handleLoginSubmit = (e) => {
                e.preventDefault();
                const isMasterLogin = passwordInput === '0814' && selectedTeacher.isSecretary;
                if (isMasterLogin || passwordInput === currentPassword) {
                    setIsAuthorizedMaster(isMasterLogin);
                    setCurrentPage('app');
                    setShowLoginModal(false);
                    setActiveTab(isMasterLogin ? 'manage_all' : (selectedTeacher.role === 'admin' ? 'admin' : 'dashboard'));
                    setPasswordInput('');
                } else { alert("รหัสผ่านไม่ถูกต้อง"); }
            };

            const handleSubmitRequest = async (e) => {
                e.preventDefault();
                const sdk = window.FirebaseSDK;
                const cv = (val) => {
                    const p = val.split('-');
                    const y = parseInt(p[0]);
                    return `${y < 2400 ? y + 543 : y}-${p[1]}-${p[2]}`;
                };

                const newReq = {
                    userId: selectedTeacher.id,
                    ...formData,
                    startDate: cv(formData.startDate),
                    endDate: cv(formData.endDate),
                    status: 'pending',
                    submittedAt: `${currentYearBE}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`,
                    timestamp: Date.now()
                };

                if (isOnline) {
                    await sdk.addDoc(sdk.collection(db, 'artifacts', appId, 'public', 'data', 'requests'), newReq);
                    setNotifications([{ id: Date.now(), msg: "ส่งใบลาออนไลน์สำเร็จ" }]);
                } else {
                    alert("ระบบ Offline: ข้อมูลจะอยู่เฉพาะในเครื่องนี้เท่านั้น");
                }
                setTimeout(() => setNotifications([]), 3000);
                setActiveTab('history');
                setFormData({ type: 'ลากิจ', startDate: '', endDate: '', reason: '', substitute: '' });
            };

            const handleLogout = () => {
                setSelectedTeacher(null);
                setCurrentPage('selection');
                setIsAuthorizedMaster(false);
                setIsMobileMenuOpen(false);
                setPasswordInput('');
            };

            // --- Render: Selection ---
            if (currentPage === 'selection') {
                return (
                    <div className="min-h-screen p-4 md:p-12 flex flex-col items-center">
                        {showLoginModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                <div className="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md p-10 text-center animate-fade-in border-4 border-white">
                                    <div className="w-20 h-20 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-blue-200 font-black"><IconComp name="lock" size={32} /></div>
                                    <h3 className="text-2xl font-black text-slate-800 tracking-tight">ยืนยันตัวตน</h3>
                                    <p className="text-blue-600 font-bold mb-8 uppercase text-xs">{selectedTeacher?.name}</p>
                                    <form onSubmit={handleLoginSubmit} className="space-y-6">
                                        <input autoFocus type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="รหัสผ่าน" className="w-full p-5 bg-slate-50 border-2 rounded-2xl text-center text-3xl font-black tracking-widest focus:ring-4 focus:ring-blue-100 outline-none transition-all" />
                                        <div className="flex gap-4">
                                            <button type="button" onClick={() => setShowLoginModal(false)} className="flex-1 py-4 text-slate-500 font-bold hover:bg-slate-100 rounded-2xl transition-all">ยกเลิก</button>
                                            <button type="submit" className="flex-1 bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-800 active:scale-95 transition-all">ตกลง</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                        <div className="max-w-7xl w-full text-center">
                            <div className="mb-12 inline-block px-10 py-5 bg-white/90 rounded-[2.5rem] border-2 border-slate-400 shadow-xl">
                                <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter italic">Leave System Online</h1>
                                <p className="text-blue-700 font-bold uppercase tracking-widest text-[10px] mt-1">โรงเรียนหนองใสพรเจริญวิทยา (พ.ศ. {currentYearBE})</p>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                {teachersList.map(t => (
                                    <button key={t.id} onClick={() => { setSelectedTeacher(t); setShowLoginModal(true); }} className={`teacher-card bg-white p-6 rounded-[1.5rem] border-2 shadow-xl text-left flex flex-col justify-between h-48 group ${t.role === 'admin' ? 'border-blue-500 bg-blue-50/50' : 'border-slate-400'}`}>
                                        <div>
                                            <h3 className="font-extrabold text-slate-900 text-xl leading-tight mb-2 break-words">{t.name} {t.role === 'admin' && <IconComp name="shield-check" size={18} className="text-blue-600 inline ml-1" />}</h3>
                                            <span className={`inline-block px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${t.role === 'admin' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>{t.pos}</span>
                                        </div>
                                        <div className="flex justify-end items-center mt-4">
                                            <div className="p-2 bg-slate-100 border border-slate-200 rounded-full group-hover:bg-blue-600 group-hover:text-white transition-all"><IconComp name="chevron-right" size={16} /></div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Render: Dashboard ---
            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row antialiased">
                    {/* Delete Confirmation */}
                    {requestToDelete && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full animate-fade-in text-center border-4 border-red-50">
                                <IconComp name="alert-triangle" size={48} className="text-red-500 mb-4" />
                                <h3 className="text-2xl font-black mb-2 uppercase">Delete Cloud Data?</h3>
                                <p className="text-slate-500 text-sm mb-8 font-bold">ข้อมูลนี้จะถูกลบออกจากฐานข้อมูลกลางอย่างถาวร</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setRequestToDelete(null)} className="flex-1 py-3 font-bold bg-slate-100 rounded-2xl">ยกเลิก</button>
                                    <button onClick={async () => { 
                                        const sdk = window.FirebaseSDK;
                                        await sdk.deleteDoc(sdk.doc(db, 'artifacts', appId, 'public', 'data', 'requests', requestToDelete));
                                        setRequestToDelete(null); 
                                    }} className="flex-1 py-3 bg-red-600 text-white font-black rounded-2xl shadow-lg">ยืนยันลบ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className={`fixed md:sticky top-0 h-screen w-72 bg-white border-r-2 border-slate-200 z-40 transform transition-transform duration-300 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-8 font-black text-blue-700 italic text-2xl border-b-2 border-slate-50 mb-4 uppercase">Leave Admin</div>
                        <nav className="px-4 space-y-1 flex-1 overflow-y-auto font-bold text-slate-600">
                            <button onClick={() => {setActiveTab('dashboard'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl transition-all ${activeTab === 'dashboard' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100'}`}><IconComp name="layout-dashboard" size={20} /> แผงควบคุม</button>
                            {!isAdmin && <button onClick={() => {setActiveTab('request'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl transition-all ${activeTab === 'request' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100'}`}><IconComp name="file-text" size={20} /> เขียนใบลา</button>}
                            <button onClick={() => {setActiveTab('history'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl transition-all ${activeTab === 'history' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100'}`}><IconComp name="history" size={20} /> ประวัติการลา</button>
                            {isAdmin && <button onClick={() => {setActiveTab('admin'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl transition-all ${activeTab === 'admin' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100'}`}><IconComp name="user-check" size={20} /> พิจารณาอนุมัติ</button>}
                            {isMaster && <button onClick={() => {setActiveTab('manage_all'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl transition-all ${activeTab === 'manage_all' ? 'bg-amber-600 text-white shadow-lg' : 'hover:bg-slate-100'}`}><IconComp name="edit-3" size={20} /> จัดการข้อมูลครู</button>}
                        </nav>
                        <div className="p-6 border-t-2 bg-slate-50/50">
                            <p className="text-sm font-black text-slate-900 leading-tight truncate">{selectedTeacher?.name}</p>
                            <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">{selectedTeacher?.pos} {isMaster && '(MASTER)'}</p>
                            <button onClick={handleLogout} className="w-full mt-4 flex items-center justify-center gap-3 py-3 bg-red-50 text-red-600 rounded-2xl font-black text-xs uppercase shadow-sm border border-red-100 hover:bg-red-100 transition-all"><IconComp name="log-out" size={18} /> Logout</button>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-10 overflow-y-auto">
                        {notifications.map(n => <div key={n.id} className="fixed bottom-10 right-10 bg-slate-900 text-white px-8 py-5 rounded-3xl shadow-2xl z-[100] font-black text-sm animate-fade-in">{n.msg}</div>)}
                        
                        <div className="mb-10 flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4">
                            <div>
                                <h2 className="text-
