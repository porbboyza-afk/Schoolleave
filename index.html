<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการลา - โรงเรียนหนองใสพรเจริญวิทยา</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #e2e8f0; 
        }
        .teacher-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .teacher-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: #2563eb; 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, deleteDoc, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.FirebaseSDK = { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, query, onSnapshot, updateDoc, deleteDoc, addDoc };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- Safe Icon Component ---
        const IconComp = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name, className]);

            return (
                <span key={name} className={`inline-flex items-center justify-center ${className}`}>
                    <i data-lucide={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        const App = () => {
            // --- Configuration ---
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'nongsai-leave-system';
            
            // --- Firebase State ---
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [isOnline, setIsOnline] = useState(false);

            // --- App States ---
            const [currentPage, setCurrentPage] = useState('selection'); 
            const [selectedTeacher, setSelectedTeacher] = useState(null);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [passwordInput, setPasswordInput] = useState('');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notifications, setNotifications] = useState([]);
            const [editingRequest, setEditingRequest] = useState(null);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [requestToDelete, setRequestToDelete] = useState(null);
            const [isAuthorizedMaster, setIsAuthorizedMaster] = useState(false);

            // Data States
            const [requests, setRequests] = useState([]);
            const [cloudPasswords, setCloudPasswords] = useState({});

            // Base Teacher List
            const baseTeachers = [
                { id: 1, name: 'นายชุมพร กรุณานำ', pos: 'ผอ.รร', role: 'admin' },
                { id: 2, name: 'นางสาวสราลักษณ์ แก้วโสภา', pos: 'ครู คศ.3', role: 'user' },
                { id: 3, name: 'นางจิราพร ไชยมาศ', pos: 'ครู คศ.3', role: 'user' },
                { id: 4, name: 'นางสาวธีมาพร นามบุรี', pos: 'ครู คศ.1', role: 'user' },
                { id: 5, name: 'นางวาสนา สุขขิน', pos: 'ครู คศ.2', role: 'user' },
                { id: 6, name: 'นางสาวยุวดี จิตรปรีดา', pos: 'ครู คศ.3', role: 'user' },
                { id: 7, name: 'นายครองศักดิ์ ขาวขันธ์', pos: 'ครู คศ.3', role: 'user' },
                { id: 8, name: 'นายวิทธวัช ตาลมงคล', pos: 'ครู คศ.1', role: 'user' },
                { id: 9, name: 'นายเอกวิทย์ ฝุ่นเงิน', pos: 'ครู คศ.2', role: 'user' },
                { id: 10, name: 'นายราชาชัย รุ่งโรจน์', pos: 'ครู คศ.2', role: 'user' },
                { id: 11, name: 'นางสาวนิราณี รักษาวงศ์', pos: 'ครูผู้ช่วย', role: 'user' },
                { id: 12, name: 'นางนวลมณี สมประสงค์', pos: 'ครู คศ.3', role: 'user' },
                { id: 13, name: 'นางสาวศิริลักษณ์ อัคนิจ', pos: 'ครู คศ.1', role: 'user' },
                { id: 14, name: 'นายสุรศักดิ์ อุ่นแก้ว', pos: 'ครู คศ.1', role: 'user' },
                { id: 15, name: 'นายเกรียงศักดิ์ สร้อยกลางเมือง', pos: 'ครู คศ.1', role: 'user' },
                { id: 16, name: 'นางสาวนัฐธิยา จันทร์ศรีโคตร', pos: 'ครูอัตราจ้าง', role: 'user' },
                { id: 17, name: 'นายปรัชญา ศรีจันทร์', pos: 'จนท.ธุรการ', role: 'user', isSecretary: true },
            ];

            const [formData, setFormData] = useState({ type: 'ลากิจ', startDate: '', endDate: '', reason: '', substitute: '' });
            const [newPasswordData, setNewPasswordData] = useState({ old: '', new: '', confirm: '' });

            // --- Initial Setup ---
            useEffect(() => {
                const init = async () => {
                    if (!window.FirebaseSDK) return;
                    const { initializeApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseSDK;
                    
                    let config;
                    try {
                        config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                    } catch (e) { config = null; }

                    if (config) {
                        const fbApp = initializeApp(config);
                        const fbAuth = getAuth(fbApp);
                        const fbDb = getFirestore(fbApp);
                        setAuth(fbAuth);
                        setDb(fbDb);

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(fbAuth, __initial_auth_token);
                        } else {
                            await signInAnonymously(fbAuth);
                        }
                        onAuthStateChanged(fbAuth, setUser);
                        setIsOnline(true);
                    }
                };
                init();
            }, []);

            // --- Data Fetching ---
            useEffect(() => {
                if (!db || !user) return;
                const { collection, onSnapshot } = window.FirebaseSDK;

                const unsubReq = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'requests'), (snaps) => {
                    setRequests(snaps.docs.map(d => ({ id: d.id, ...d.data() })));
                });

                const unsubPass = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'passwords'), (snaps) => {
                    const dict = {};
                    snaps.docs.forEach(d => { dict[d.id] = d.data().password; });
                    setCloudPasswords(dict);
                });

                return () => { unsubReq(); unsubPass(); };
            }, [db, user]);

            // --- Helpers ---
            const formatDateBE = (dateStr) => {
                if (!dateStr) return '';
                const parts = dateStr.split('-');
                if (parts.length !== 3) return dateStr;
                const year = parseInt(parts[0]);
                const yearBE = year < 2400 ? year + 543 : year;
                return `${parts[2]}/${parts[1]}/${yearBE}`;
            };

            const getCurrentYearBE = () => new Date().getFullYear() + 543;
            
            const getCurrentDateBE = () => {
                const now = new Date();
                const yearBE = now.getFullYear() + 543;
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                return `${yearBE}-${month}-${day}`;
            };

            // --- Derived Values (Hooks at Top) ---
            const isAdmin = selectedTeacher?.role === 'admin';
            const isMaster = isAuthorizedMaster;
            const currentPassword = cloudPasswords[selectedTeacher?.id] || '1234';
            const userRequests = useMemo(() => selectedTeacher ? requests.filter(r => r.userId === selectedTeacher.id) : [], [requests, selectedTeacher]);
            const stats = useMemo(() => {
                const calc = (type) => ({ 
                    used: userRequests.filter(r => r.type === type && r.status === 'approved').length, 
                    pending: userRequests.filter(r => r.type === type && r.status === 'pending').length 
                });
                return { personal: calc('ลากิจ'), sick: calc('ลาป่วย'), maternity: calc('ลาคลอดบุตร'), paternity: calc('ลาช่วยภรรยา'), ordination: calc('ลาอุปสมบท') };
            }, [userRequests]);

            // --- Actions ---
            const handleLoginSubmit = (e) => {
                e.preventDefault();
                const isMasterLogin = passwordInput === '0814' && selectedTeacher.isSecretary;
                if (isMasterLogin || passwordInput === currentPassword) {
                    setIsAuthorizedMaster(isMasterLogin);
                    setCurrentPage('app');
                    setShowLoginModal(false);
                    setActiveTab(isMasterLogin ? 'manage_all' : (selectedTeacher.role === 'admin' ? 'admin' : 'dashboard'));
                    setPasswordInput('');
                } else { alert("รหัสผ่านไม่ถูกต้อง"); }
            };

            const handleLogout = () => {
                setSelectedTeacher(null);
                setCurrentPage('selection');
                setShowLoginModal(false);
                setIsAuthorizedMaster(false);
                setIsMobileMenuOpen(false);
            };

            const handleSubmitRequest = async (e) => {
                e.preventDefault();
                if (!isOnline) { alert("ขณะนี้ระบบทำงาน Offline ข้อมูลจะไม่ถูกส่งไปยังเครื่องอื่น"); return; }
                const { addDoc, collection } = window.FirebaseSDK;
                const cvYear = (val) => {
                    const p = val.split('-');
                    const y = parseInt(p[0]);
                    return `${y < 2400 ? y + 543 : y}-${p[1]}-${p[2]}`;
                };
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'requests'), {
                    userId: selectedTeacher.id,
                    ...formData,
                    startDate: cvYear(formData.startDate),
                    endDate: cvYear(formData.endDate),
                    status: 'pending',
                    submittedAt: getCurrentDateBE(),
                    timestamp: Date.now()
                });
                setNotifications([{ id: Date.now(), msg: "ส่งใบลาขึ้นระบบคลาวด์เรียบร้อย" }]);
                setTimeout(() => setNotifications([]), 3000);
                setActiveTab('history');
                setFormData({ type: 'ลากิจ', startDate: '', endDate: '', reason: '', substitute: '' });
            };

            const updateStatus = async (id, newStatus) => {
                const { updateDoc, doc } = window.FirebaseSDK;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'requests', id), { status: newStatus });
                setNotifications([{ id: Date.now(), msg: "อัปเดตสถานะสำเร็จ" }]);
                setTimeout(() => setNotifications([]), 3000);
            };

            const exportToExcel = () => {
                const headers = ['ลำดับ', 'ชื่อ-นามสกุล', 'ประเภท', 'เริ่ม', 'ถึง', 'เหตุผล', 'ผู้ปฏิบัติแทน', 'สถานะ'];
                const rows = requests.map((req, idx) => {
                    const t = baseTeachers.find(x => x.id === req.userId);
                    return [idx + 1, t?.name, req.type, formatDateBE(req.startDate), formatDateBE(req.endDate), (req.reason || '').replace(/,/g, ' '), req.substitute, req.status];
                });
                const csv = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const link = document.createElement("a");
                link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
                link.download = `รายงานการลา_${getCurrentDateBE()}.csv`;
                link.click();
            };

            // --- Rendering ---
            if (currentPage === 'selection') {
                return (
                    <div className="min-h-screen bg-slate-200 p-4 md:p-12 flex flex-col items-center">
                        {showLoginModal && (
                            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-md p-10 animate-fade-in border-4 border-white text-center">
                                    <div className="w-20 h-20 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-blue-200"><IconComp name="key-round" size={36} /></div>
                                    <h3 className="text-2xl font-extrabold text-slate-800 tracking-tight">ยืนยันรหัสผ่าน</h3>
                                    <p className="text-blue-600 font-bold mb-8">{selectedTeacher?.name}</p>
                                    <form onSubmit={handleLoginSubmit} className="space-y-6">
                                        <input autoFocus type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} placeholder="รหัสผ่าน" className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl text-center text-3xl font-black tracking-widest outline-none focus:ring-4 focus:ring-blue-100" />
                                        <div className="flex gap-4">
                                            <button type="button" onClick={() => setShowLoginModal(false)} className="flex-1 py-4 text-slate-500 font-bold">ยกเลิก</button>
                                            <button type="submit" className="flex-1 bg-blue-700 text-white py-4 rounded-2xl font-black shadow-lg">ตกลง</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                        <div className="max-w-7xl w-full text-center">
                            <div className="mb-12 inline-block px-10 py-5 bg-white/70 rounded-full border-2 border-slate-300 shadow-sm backdrop-blur-sm">
                                <h1 className="text-4xl font-black text-blue-950 uppercase tracking-tighter">ระบบจัดการการลา ออนไลน์</h1>
                                <p className="text-slate-600 font-bold uppercase tracking-widest text-xs mt-1">โรงเรียนหนองใสพรเจริญวิทยา (พ.ศ. {getCurrentYearBE()})</p>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                                {baseTeachers.map(t => (
                                    <button key={t.id} onClick={() => { setSelectedTeacher(t); setShowLoginModal(true); }} className={`teacher-card bg-white p-6 rounded-[1.5rem] border-2 shadow-lg text-left flex flex-col justify-between h-44 ${t.role === 'admin' ? 'border-blue-400 bg-blue-50/30' : 'border-slate-300'}`}>
                                        <div>
                                            <h3 className="font-extrabold text-slate-900 text-xl leading-tight mb-2 break-words">{t.name} {t.role === 'admin' && <IconComp name="shield-check" size={18} className="text-blue-600 inline" />}</h3>
                                            <span className={`inline-block px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${t.role === 'admin' ? 'bg-blue-600 text-white' : 'bg-slate-200 text-slate-600'}`}>{t.pos}</span>
                                        </div>
                                        <div className="flex justify-end items-center"><div className="p-2 bg-slate-50 border border-slate-200 rounded-full"><IconComp name="chevron-right" size={16} /></div></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row antialiased">
                    {/* Delete Confirm */}
                    {requestToDelete && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4 text-center">
                            <div className="bg-white rounded-[2rem] p-8 shadow-2xl max-w-sm w-full animate-fade-in">
                                <IconComp name="alert-triangle" size={48} className="text-red-500 mb-4" />
                                <h3 className="text-2xl font-black mb-2 text-slate-800">ลบข้อมูลคลาวด์?</h3>
                                <div className="flex gap-3 mt-8">
                                    <button onClick={() => setRequestToDelete(null)} className="flex-1 py-3 font-bold bg-slate-100 rounded-2xl">ยกเลิก</button>
                                    <button onClick={async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'requests', requestToDelete)); setRequestToDelete(null); }} className="flex-1 py-3 bg-red-600 text-white font-black rounded-2xl">ยืนยันลบ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className={`fixed md:sticky top-0 h-screen w-72 bg-white border-r-2 border-slate-200 z-40 transform transition-transform duration-300 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-8 font-black text-blue-700 italic text-2xl tracking-tighter">SCHOOL ONLINE</div>
                        <nav className="px-4 space-y-1 flex-1 overflow-y-auto">
                            <button onClick={() => {setActiveTab('dashboard'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'dashboard' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="layout-dashboard" size={20} /> แผงควบคุม</button>
                            {!isAdmin && <button onClick={() => {setActiveTab('request'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'request' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="file-text" size={20} /> เขียนใบลา</button>}
                            <button onClick={() => {setActiveTab('history'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'history' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="history" size={20} /> ประวัติการลา</button>
                            {isAdmin && <button onClick={() => {setActiveTab('admin'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'admin' ? 'bg-blue-700 text-white shadow-lg' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="user-check" size={20} /> พิจารณาอนุมัติ</button>}
                            {isMaster && <button onClick={() => {setActiveTab('manage_all'); setIsMobileMenuOpen(false)}} className={`w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-bold transition-all ${activeTab === 'manage_all' ? 'bg-amber-600 text-white shadow-lg' : 'hover:bg-slate-100 text-slate-600'}`}><IconComp name="edit-3" size={20} /> จัดการข้อมูลครู</button>}
                        </aside>
                        <div className="p-6 border-t-2 bg-slate-50/50">
                            <p className="text-sm font-black text-slate-900 leading-tight truncate">{selectedTeacher?.name}</p>
                            <p className="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1">{selectedTeacher?.pos}</p>
                            <button onClick={handleLogout} className="w-full mt-4 flex items-center justify-center gap-3 py-3 bg-red-50 text-red-600 rounded-2xl font-black text-xs uppercase shadow-sm"><IconComp name="log-out" size={18} /> Logout</button>
                        </div>
                    </aside>

                    <main className="flex-1 p-4 md:p-10 overflow-y-auto">
                        <header className="mb-10 flex flex-col sm:row justify-between items-start sm:items-end gap-4">
                            <div><h2 className="text-4xl font-black uppercase tracking-tighter text-slate-900 italic">{activeTab.replace('_', ' ')}</h2><p className={`text-xs font-bold mt-1 uppercase ${isOnline ? 'text-green-500' : 'text-red-500'}`}>{isOnline ? '● Cloud Connected' : '● Offline Mode'}</p></div>
                            {(isAdmin || isMaster) && <button onClick={exportToExcel} className="bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black text-xs flex gap-3 items-center uppercase tracking-widest shadow-xl hover:bg-emerald-700"><IconComp name="download" size={18} /> Export Excel</button>}
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="bg-white rounded-[2.5rem] shadow-xl border-2 border-slate-100 overflow-hidden">
                                <div className="p-10 border-b-2 font-black text-2xl uppercase text-slate-800 flex items-center gap-3">สถิติสะสม พ.ศ. {getCurrentYearBE()}</div>
                                <div className="overflow-x-auto"><table className="w-full text-left">
                                    <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400"><tr><th className="px-10 py-6">ประเภท</th><th className="px-10 py-6 text-center">อนุมัติแล้ว</th><th className="px-10 py-6 text-center">รออนุมัติ</th><th className="px-10 py-6 text-right">ระบบ</th></tr></thead>
                                    <tbody className="divide-y-2 divide-slate-50">
                                        {[{t:'ลากิจ', s:stats.personal}, {t:'ลาป่วย', s:stats.sick}, {t:'ลาคลอดบุตร', s:stats.maternity}, {t:'ลาช่วยภรรยา', s:stats.paternity}, {t:'ลาอุปสมบท', s:stats.ordination}].map((r, i) => (
                                            <tr key={i} className="hover:bg-slate-50/50 font-bold"><td className="px-10 py-8 text-lg text-slate-700 uppercase">{r.t}</td><td className="px-10 py-8 text-center text-emerald-600 text-4xl font-black">{r.s.used}</td><td className="px-10 py-8 text-center text-amber-500 text-4xl font-black">{r.s.pending}</td><td className="px-10 py-8 text-right font-black uppercase text-[10px] text-slate-400">SYNC</td></tr>
                                        ))}
                                    </tbody></table></div>
                            </div>
                        )}

                        {activeTab === 'request' && (
                            <div className="max-w-3xl bg-white rounded-[2.5rem] p-10 md:p-12 shadow-xl border-2 border-slate-100">
                                <h3 className="text-3xl font-black mb-10 tracking-tight italic uppercase text-slate-900 border-b-4 border-blue-100 pb-4 inline-block">เขียนใบลาใหม่</h3>
                                <form onSubmit={handleSubmitRequest} className="space-y-8">
